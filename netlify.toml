[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/blog/kosher-pizza-coral-springs-florida"
  to = "/blog"
  status = 301
  force = true

[[redirects]]
  from = "/client-stories"
  to = "/testimonials"
  status = 301
  force = true
